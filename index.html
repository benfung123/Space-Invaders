<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="ui">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="credits">$<span id="credits">0</span></div>
            <div class="level">Level: <span id="level">1</span></div>
            <div class="combo" id="comboBox">Combo: ×<span id="combo">0</span></div>
            <div class="high-score">High: <span id="highScore">0</span></div>
            <button id="muteBtn" class="mute-btn">🔊</button>
        </div>
        <div class="powerups" id="powerupBar"></div>
        <div class="canvas-wrap">
            <button id="pauseBtn" class="pause-btn">⏸</button>
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="controls" id="mobileControls">
            <button id="leftBtn" class="control-btn">◀</button>
            <button id="fireBtn" class="control-btn">🔥</button>
            <button id="rightBtn" class="control-btn">▶</button>
        </div>
        <div class="overlay" id="startScreen">
            <h1>SPACE INVADERS</h1>
            <p>Use ← → to move, SPACE to shoot, P to pause</p>
            <p class="small">Collect power-ups: 🛡️ Shield | ⚡ Rapid | 🔱 Multi</p>
            <button id="startBtn">START GAME</button>
            <button id="lbBtnStart">🏆 LEADERBOARD</button>
        </div>
        <div class="overlay hidden" id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p class="high">High Score: <span id="finalHighScore">0</span></p>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
        <div class="overlay hidden" id="levelUpScreen">
            <h1>LEVEL <span id="levelUpNum">2</span></h1>
            <p>Get ready...</p>
        </div>
        <div class="overlay hidden" id="pauseScreen">
            <h1>PAUSED</h1>
            <button id="resumeBtn">RESUME</button>
            <button id="pauseShopBtn">🛒 SHOP</button>
            <button id="quitBtn">QUIT TO MENU</button>
        </div>
        <div class="overlay hidden" id="shopScreen">
            <h1>SUPPLY DROP</h1>
            <p class="credits">Credits: <span id="shopScore">0</span></p>
            <div class="shop-grid" id="shopGrid"></div>
            <button id="shopContinueBtn">CONTINUE</button>
        </div>
        <div class="overlay hidden" id="nameEntryScreen">
            <h1>TOP 5!</h1>
            <p class="entry-rank">Rank #<span id="entryRank">1</span></p>
            <p class="entry-score">Score: <span id="entryScore">0</span></p>
            <input type="text" id="nameInput" maxlength="3" placeholder="AAA" value="AAA">
            <button id="nameSubmitBtn">SUBMIT</button>
        </div>
        <div class="overlay hidden" id="leaderboardScreen">
            <h1>🏆 LEADERBOARD</h1>
            <div class="lb-table" id="lbTable"></div>
            <button id="lbPlayBtn">PLAY AGAIN</button>
            <button id="lbMenuBtn">MAIN MENU</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
